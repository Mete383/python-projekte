<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanz- & Spar-Simulator</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid #334155;
            width: 350px;
        }
        h2 { text-align: center; color: #38bdf8; margin-top: 0; }
        .input-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-size: 0.95rem; color: #94a3b8; }
        input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 10px;
            font-size: 1rem;
            border-radius: 8px;
            outline: none;
        }
        input:focus { border-color: #38bdf8; }
        .calc-btn {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .calc-btn:hover { background: #0ea5e9; }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background: #0f172a;
            border-left: 4px solid #38bdf8;
            border-radius: 4px;
            display: none;
            text-align: center;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>📈 Spar-Simulator</h2>
        
        <div class="input-group">
            <label>Aktuelles Startkapital (€):</label>
            <input type="number" id="start" value="1000">
        </div>
        
        <div class="input-group">
            <label>Monatliche Sparrate (€):</label>
            <input type="number" id="rate" value="200">
        </div>
        
        <div class="input-group">
            <label>Gewünschte Zielsumme (€):</label>
            <input type="number" id="ziel" value="5000">
        </div>
        
        <button class="calc-btn" id="calcBtn">Sparzeit berechnen</button>
        
        <div class="result-box" id="resultBox">
            Du brauchst genau <strong id="monthsOutput" style="color: #38bdf8;">0</strong> Monate!
        </div>
    </div>

    <script>
        document.getElementById('calcBtn').addEventListener('click', () => {
            const startkapital = document.getElementById('start').value;
            const sparrate = document.getElementById('rate').value;
            const zielsumme = document.getElementById('ziel').value;

            // JavaScript schickt die Zahlen per POST an deine Python-Route '/berechne'
            fetch('/berechne', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ startkapital, sparrate, zielsumme })
            })
            .then(res => res.json())
            .then(data => {
                // Das Ergebnis aus deiner Python-Schleife wird hier angezeigt!
                document.getElementById('monthsOutput').innerText = data.monate;
                document.getElementById('resultBox').style.display = 'block';
            });
        });
    </script>
</body>
</html>
